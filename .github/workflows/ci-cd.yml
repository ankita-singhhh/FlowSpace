name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017
        options: >-
          --auth
          -u admin
          -p password

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: flowspace-backend
    
    - name: Install Backend Dependencies
      working-directory: ./flowspace-backend
      run: npm ci
    
    - name: Run Backend Tests
      working-directory: ./flowspace-backend
      run: npm test
      env:
        MONGO_URI: mongodb://admin:password@localhost:27017/test?authSource=admin
        JWT_SECRET: test-jwt-secret

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: flowspace-frontend
    
    - name: Install Frontend Dependencies
      working-directory: ./flowspace-frontend
      run: npm ci
    
    - name: Run Frontend Tests
      working-directory: ./flowspace-frontend
      run: npm test
    
    - name: Run Frontend Linting
      working-directory: ./flowspace-frontend
      run: npm run lint
    
    - name: Build Frontend
      working-directory: ./flowspace-frontend
      run: npm run build

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Production
      run: |
        echo "Deployment step would go here"
        echo "Configure your hosting provider (Vercel, Netlify, AWS, etc.)"
